<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <h1>Formulario ne HTML</h1>

    <form action="mi_servidor">
        <fieldset>
            <legend>Datos personales</legend>
                
                <label for="idPersona">Persona:</label><br>
                    <input type="text" id="idPersona" name="idPersona" readonly="true" value="100">

                <label for="nombre">NOmbre:</label><br><!--el FOR...se debe vincular con el id del input-->
                <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre"><br>

                <label for="apellido">Apellido</label><br>
                <input type="text" id="apellido" name="apellido" placeholder="Escribe tu apellido"><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email"><br>

                <label for="edad">Edad:</label><br>
                <input type="number" id="edad" name="edad">
                <br><br>
                <label > Genero</label><br>
                <input type="radio" id="femenino" name="genero" value="Femenino">
                <label for="femenino">Femenino</label><br> 
                <input type="radio" id="masculino" name="genero" value="masculino">
                <label for="masculino">Masculino</label><br> 
                    <br>
                <label>Genero musica favorita</label><br>
                <input type="checkbox" id="clasica" name="musica" value="clasica">
                <label for="clasica">Clasica</label><br>
                <input type="checkbox" id="jazz" name="musica" value="jazz">
                <label for="jazz">jazz</label><br><br>

                <label for="autos">Marca auto favorito:</label><br>
                <select name="autos" id="autos">
                    <option value="volvo">volvo</option>
                    <option value="bmw">bmw</option>
                    <option value="audi">audi</option>
                </select><br>

                <label for="comentario">Comentario:</label><br>
                <textarea name="comentario" id="comentario" cols="30" rows="2">este es mi coment</textarea><br>


                <input type="submit" value="enviarR">
                <input type="submit" formnovalidate="formnovalidate" value="Enviar sin Validar">
                <input type="reset" value="restablecer">
    </fieldset> 
    </form>
</body>
</html>
